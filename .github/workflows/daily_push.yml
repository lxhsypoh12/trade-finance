name: 贸易项目每日推送

on:
  schedule:
    - cron: '30 9 * * *'  # UTC 9:30 ≈ 北京时间 17:30（留出30分钟缓冲）
  workflow_dispatch:        # 允许手动触发

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 执行推送
        env:
          FEISHU_TRADE_WEBHOOK: ${{ secrets.FEISHU_TRADE_WEBHOOK }}
          FEISHU_SUPABASE_KEY: ${{ secrets.FEISHU_SUPABASE_KEY }}
        run: python 贸易项目推送.py
